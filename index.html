<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Black Paper — The time manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Black Paper</h1>
    <p class="subtitle">The Estimation Gap — Get know how wrong you are</p>

    <div id="stats"></div>

    <form id="task-form">
      <input type="text" id="task-name" placeholder="What are you about to do?" required>
      <select id="task-category">
        <option value="Study">Study</option>
        <option value="tech">Tech</option>
        <option value="Chores">Chores</option>
        <option value="Skill">Skill</option>
        <option value="Other">Other</option>
        <option value="task category" selected>Select task category</option>
      </select>
      <div class="estimate-row">
        <input type="number" id="task-estimate" placeholder="Estimated time" min="1" required>
        <select id="task-unit">
          <option value="minutes">minutes</option>
          <option value="hours">hours</option>
          <option value="days">days</option>
        </select>
      </div>
      <p id="prediction"></p>
      <button type="submit">Start Task</button>
    </form>

    <div id="task-list"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
